<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px; height: 1080px; overflow: hidden;
  background: #0f172a;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
  display: flex; align-items: center; justify-content: center;
}

.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(99,102,241,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,0.08) 1px, transparent 1px);
  background-size: 60px 60px;
}

.bg-glow {
  position: absolute;
  width: 800px; height: 800px;
  background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}

.container {
  position: relative;
  display: flex; flex-direction: column; align-items: center; gap: 48px;
}

.badge {
  background: rgba(99,102,241,0.15);
  border: 1px solid rgba(99,102,241,0.4);
  color: #a5b4fc;
  font-size: 22px; font-weight: 500;
  padding: 8px 24px; border-radius: 100px;
  letter-spacing: 0.02em;
}

.title {
  font-size: 96px; font-weight: 700;
  color: #fff;
  letter-spacing: -0.03em;
  text-align: center;
  line-height: 1.05;
}
.title span { color: #818cf8; }

.subtitle {
  font-size: 30px; color: #94a3b8;
  text-align: center; line-height: 1.6;
  max-width: 900px;
}

.flow {
  display: flex; align-items: center; gap: 20px;
  margin-top: 8px;
}

.step {
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}

.step-icon {
  width: 120px; height: 120px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
}

.step-icon svg { width: 56px; height: 56px; }

.step-label {
  font-size: 22px; color: #cbd5e1; font-weight: 500; text-align: center;
}

.arrow {
  font-size: 36px; color: #475569; margin-bottom: 36px;
}

.tags {
  display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
}
.tag {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #94a3b8;
  font-size: 20px; padding: 8px 20px; border-radius: 8px;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="container">
  <div class="badge">Figma Plugin</div>
  <div style="display:flex;align-items:center;gap:28px;">
    <img src="iconbridgelogo.png" style="width:96px;height:96px;border-radius:20px;" />
    <div class="title">Icon<span>Bridge</span></div>
  </div>
  <div class="subtitle">Browse, replace, and sync icons<br>between Figma and iconfont.cn</div>

  <div class="flow">
    <div class="step">
      <div class="step-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
        </svg>
      </div>
      <div class="step-label">Browse & Search</div>
    </div>
    <div class="arrow">→</div>
    <div class="step">
      <div class="step-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"/>
          <rect x="3" y="3" width="18" height="18" rx="3"/>
        </svg>
      </div>
      <div class="step-label">Drag to Canvas</div>
    </div>
    <div class="arrow">→</div>
    <div class="step">
      <div class="step-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/>
          <path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/>
        </svg>
      </div>
      <div class="step-label">Replace Icons</div>
    </div>
    <div class="arrow">→</div>
    <div class="step">
      <div class="step-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="step-label">Upload to Project</div>
    </div>
  </div>

  <div class="tags">
    <div class="tag">Drag & Drop</div>
    <div class="tag">Batch Replace</div>
    <div class="tag">Batch Upload</div>
    <div class="tag">CORS Proxy Included</div>
  </div>
</div>
</body>
</html>
